; PlatformIO Project Configuration
;
; ESP32-WROOM-32 capturing stereo PDM from two IM69D130 Shield2Go mics
; and streaming raw audio over TCP to a PC.

[env:esp32dev]
platform       = file://${PROJECT_DIR}/platform/pioarduino-espressif32-55.03.38
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 460800

build_flags =
    ; CORE_DEBUG_LEVEL=0 silences the Arduino network library's internal
    ; log_e() calls. On a weak WiFi link UDP sends fail with ENOMEM and the
    ; library would otherwise log "[E][NetworkUdp.cpp] could not send data"
    ; thousands of times per second over the 115200 UART — which blocks the
    ; audio task on Serial writes and makes the stall dramatically worse.
    ; Our own [audio]/[udp]/[pdm] Serial.printf lines are unaffected.
    -DCORE_DEBUG_LEVEL=0
    -std=gnu++17
    -Wall
build_unflags =
    -std=gnu++11
